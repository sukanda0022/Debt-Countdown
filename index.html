<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Debt Track ✨</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="cash.png" />
    <link rel="icon" type="image/png" href="cash.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@300;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      :root {
        --bg-primary: #0f1117;
        --bg-secondary: #1a1d27;
        --bg-card: #1e2235;
        --bg-card-hover: #252a40;
        --accent-blue: #4f8ef7;
        --accent-blue-soft: rgba(79, 142, 247, 0.12);
        --accent-green: #34d399;
        --accent-green-soft: rgba(52, 211, 153, 0.12);
        --accent-purple: #a78bfa;
        --accent-purple-soft: rgba(167, 139, 250, 0.12);
        --accent-amber: #fbbf24;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --border: rgba(255,255,255,0.07);
        --border-hover: rgba(79, 142, 247, 0.4);
        --shadow-glow: 0 0 40px rgba(79, 142, 247, 0.08);
        --radius-card: 24px;
        --radius-input: 16px;
        --radius-btn: 14px;
      }
 
      * { box-sizing: border-box; margin: 0; padding: 0; }
 
      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "Sarabun", sans-serif;
        min-height: 100vh;
        padding: 0 0 130px;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        overflow-x: hidden;
      }
 
      /* Ambient background blobs */
      body::before {
        content: '';
        position: fixed;
        top: -80px; left: -80px;
        width: 400px; height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: '';
        position: fixed;
        bottom: 100px; right: -100px;
        width: 350px; height: 350px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
 
      .app-wrapper {
        max-width: 430px;
        margin: 0 auto;
        padding: 0 16px;
        position: relative;
        z-index: 1;
      }
 
      /* ─── HEADER ─── */
      header {
        padding: 48px 0 28px;
        text-align: center;
      }
      .header-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px; height: 56px;
        background: linear-gradient(135deg, #1e3a6e 0%, #1e2a5e 100%);
        border-radius: 18px;
        border: 1px solid rgba(79,142,247,0.25);
        margin-bottom: 14px;
        box-shadow: 0 8px 24px rgba(79,142,247,0.15);
      }
      .header-icon i { font-size: 22px; color: var(--accent-blue); }
      header h1 {
        font-family: "Prompt", sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.5px;
      }
      header p {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 4px;
        font-weight: 300;
      }
 
      /* ─── CARDS ─── */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 24px;
        margin-bottom: 12px;
        box-shadow: var(--shadow-glow);
        transition: border-color 0.3s;
      }
 
      /* ─── FORM ELEMENTS ─── */
      .field-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        margin-left: 4px;
      }
      .field-label .icon { margin-right: 4px; }
 
      .premium-input, .premium-select {
        width: 100%;
        background: rgba(255,255,255,0.04);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-input);
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 600;
        font-family: "Sarabun", sans-serif;
        color: var(--text-primary);
        outline: none;
        transition: all 0.25s ease;
        -webkit-appearance: none;
      }
      .premium-input:focus, .premium-select:focus {
        border-color: var(--accent-blue);
        background: rgba(79,142,247,0.06);
        box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
      }
      .premium-input::placeholder { color: var(--text-muted); font-weight: 400; }
 
      .amount-input {
        font-size: 28px;
        text-align: center;
        color: var(--accent-green);
        letter-spacing: -0.5px;
        padding: 16px;
      }
      .amount-input::placeholder { color: rgba(52,211,153,0.25); }
 
      .select-wrap {
        position: relative;
      }
      .select-wrap i {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
        font-size: 12px;
      }
      .premium-select option {
        background: #1e2235;
        color: var(--text-primary);
      }
 
      /* ─── FORM SPACING ─── */
      .field-group { margin-bottom: 20px; }
 
      /* ─── SAVE BUTTON ─── */
      .btn-save {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: var(--radius-btn);
        background: linear-gradient(135deg, #1d4ed8 0%, var(--accent-blue) 100%);
        color: #fff;
        font-family: "Prompt", sans-serif;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 8px 24px rgba(79,142,247,0.25);
        letter-spacing: 0.02em;
        margin-top: 8px;
      }
      .btn-save:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(79,142,247,0.35); }
      .btn-save:active { transform: scale(0.98); }
      .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
 
      /* ─── SUMMARY PAGE ─── */
      .filter-select {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-input);
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 700;
        font-family: "Prompt", sans-serif;
        color: var(--accent-blue);
        width: 100%;
        outline: none;
        -webkit-appearance: none;
        text-align: center;
        transition: border-color 0.25s;
        cursor: pointer;
      }
      .filter-select:focus { border-color: var(--accent-blue); }
      .filter-select option { background: #1e2235; color: var(--text-primary); font-family: "Sarabun"; }
 
      /* Hero card */
      .hero-card {
        background: linear-gradient(135deg, #1a2744 0%, #1e1b3a 100%);
        border: 1px solid rgba(79,142,247,0.15);
        border-radius: 28px;
        padding: 32px;
        text-align: center;
        position: relative;
        overflow: hidden;
        margin-bottom: 12px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.3);
      }
      .hero-card::before {
        content: '';
        position: absolute;
        top: -40px; right: -40px;
        width: 160px; height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(52,211,153,0.12) 0%, transparent 70%);
      }
      .hero-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 10px;
      }
      .hero-amount {
        font-family: "Prompt", sans-serif;
        font-size: 48px;
        font-weight: 800;
        color: var(--accent-green);
        letter-spacing: -2px;
        line-height: 1;
        margin-bottom: 10px;
      }
      .hero-count {
        font-size: 12px;
        color: var(--text-muted);
        background: rgba(255,255,255,0.05);
        display: inline-block;
        padding: 4px 14px;
        border-radius: 20px;
        font-weight: 500;
      }
 
      /* Mini stat cards */
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 18px 16px;
        text-align: center;
      }
      .stat-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      .stat-amount {
        font-family: "Prompt", sans-serif;
        font-size: 18px;
        font-weight: 700;
      }
      .stat-amount.blue { color: var(--accent-blue); }
      .stat-amount.purple { color: var(--accent-purple); }
 
      /* History items */
      .history-item {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 16px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        transition: all 0.2s ease;
        cursor: default;
      }
      .history-item:hover {
        border-color: rgba(79,142,247,0.2);
        background: var(--bg-card-hover);
        transform: translateY(-1px);
      }
      .history-date {
        font-size: 10px;
        font-weight: 600;
        color: var(--accent-blue);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
      .history-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 5px;
      }
      .history-badge {
        display: inline-flex;
        align-items: center;
        background: var(--accent-green-soft);
        color: var(--accent-green);
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 8px;
        border: 1px solid rgba(52,211,153,0.15);
      }
 
      .history-actions { display: flex; gap: 8px; }
      .action-btn {
        width: 38px; height: 38px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px;
        transition: all 0.2s;
      }
      .action-btn:active { transform: scale(0.9); }
      .btn-edit { background: var(--accent-blue-soft); color: var(--accent-blue); border: 1px solid rgba(79,142,247,0.15); }
      .btn-edit:hover { background: rgba(79,142,247,0.2); }
      .btn-delete { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.1); }
      .btn-delete:hover { background: rgba(248,113,113,0.2); }
 
      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 60px 0;
        color: var(--text-muted);
        font-size: 13px;
      }
      .empty-state i { font-size: 36px; margin-bottom: 12px; display: block; opacity: 0.3; }
 
      /* ─── MODAL ─── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(8px);
        z-index: 100;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0;
        transition: opacity 0.25s;
      }
      .modal-overlay.hidden { display: none; }
      .modal-sheet {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-bottom: none;
        border-radius: 28px 28px 0 0;
        width: 100%;
        max-width: 430px;
        padding: 28px 24px 48px;
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .modal-handle {
        width: 36px; height: 4px;
        background: var(--text-muted);
        border-radius: 2px;
        margin: 0 auto 20px;
        opacity: 0.4;
      }
      .modal-title {
        font-family: "Prompt", sans-serif;
        font-size: 18px;
        font-weight: 700;
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 24px;
      }
      .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
      .btn-cancel {
        flex: 1; padding: 15px;
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        background: transparent;
        color: var(--text-secondary);
        font-family: "Sarabun"; font-size: 15px; font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-confirm {
        flex: 1; padding: 15px;
        border: none;
        border-radius: var(--radius-btn);
        background: linear-gradient(135deg, #1d4ed8 0%, var(--accent-blue) 100%);
        color: #fff;
        font-family: "Sarabun"; font-size: 15px; font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 6px 20px rgba(79,142,247,0.25);
      }
      .btn-confirm:active { transform: scale(0.97); }
 
      /* ─── NAVBAR ─── */
      .navbar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(15,17,23,0.9);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
        z-index: 50;
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 12px 24px calc(12px + env(safe-area-inset-bottom));
      }
      .nav-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 32px;
        border: 1px solid transparent;
        border-radius: 14px;
        background: transparent;
        color: var(--text-muted);
        font-family: "Sarabun"; font-size: 11px; font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
      }
      .nav-btn i { font-size: 18px; }
      .nav-btn.active {
        background: var(--accent-blue-soft);
        border-color: rgba(79,142,247,0.2);
        color: var(--accent-blue);
      }
 
      /* ─── PAGE TRANSITIONS ─── */
      .page { animation: fadeIn 0.35s ease; }
      .hidden { display: none !important; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
 
      /* ─── DIVIDER ─── */
      .section-divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 24px 0 16px;
      }
      .section-divider span {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
      .section-divider::before, .section-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
 
      footer {
        text-align: center;
        padding: 16px 0 0;
      }
      footer p {
        font-size: 10px;
        color: var(--text-muted);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
 
      /* Scrollbar */
      ::-webkit-scrollbar { width: 0px; }
    </style>
  </head>

    <div class="app-wrapper">

        <div class="card">

                <option value="ไทยประกันพ่อ">🛡️ ไทยประกันพ่อ</option>
                <option value="ค่าโทรศัพท์สุ">📱 ค่าโทรศัพท์สุ</option>
                <option value="ค่าโทรศัพท์ดา">📱 ค่าโทรศัพท์ดา</option>

                <option value="ค่าไฟ">⚡ ค่าไฟ</option>

                <option value="ค่าเน็ตมือถือปุ้ย">📱 เน็ตมือถือปุ้ย</option>
                <option value="ค่าเน็ตมือถือพ่อ">📱 เน็ตมือถือพ่อ</option>
                <option value="ออมสิน(สินเชื่อบ้าน)">🏠 ออมสิน (บ้าน)</option>
                <option value="ออมสิน(เครดิตสุ)">💳 ออมสิน (สุ)</option>
                <option value="งวดรถvespa">🛵 งวดรถ Vespa</option>
                <option value="อื่นๆ">✏️ อื่นๆ (ระบุเอง)</option>
              </select>
              <i class="fa-solid fa-chevron-down"></i>
            </div>
            <input type="text" id="debt-name-other" class="premium-input hidden" style="margin-top:10px;" placeholder="ระบุชื่อรายการ..." />
          </div>
 
          <div class="field-group">
            <label class="field-label" style="color:var(--accent-green);"><span class="icon">💵</span> ยอดจ่ายครั้งนี้</label>
            <input type="number" id="paid-amount" class="premium-input amount-input" placeholder="0.00" inputmode="decimal" />
          </div>
 
          <div class="field-group">
            <label class="field-label"><span class="icon">🏦</span> ช่องทางจ่าย</label>
            <div class="select-wrap">
              <select id="source-select" class="premium-input premium-select" onchange="toggleOtherSource()">
                <option value="">— เลือกช่องทาง —</option>
                <option value="เงินสด">💵 เงินสด</option>
                <option value="กสิกร">🟢 กสิกรไทย (K-Bank)</option>
                <option value="ไทยพาณิชย์">🟣 ไทยพาณิชย์ (SCB)</option>
                <option value="กรุงเทพ">🔵 กรุงเทพ (BBL)</option>

                <option value="กรุงศรี">🟡 กรุงศรี (BAY)</option>
                <option value="ออมสิน">🔴 ออมสิน (GSB)</option>
                <option value="อื่นๆ">✏️ อื่นๆ (ระบุเอง)</option>
              </select>
              <i class="fa-solid fa-chevron-down"></i>
            </div>
            <input type="text" id="source-other" class="premium-input hidden" style="margin-top:10px;" placeholder="ระบุธนาคาร..." />
          </div>
 
          <button onclick="saveData()" id="btnSave" class="btn-save">
            <i class="fa-solid fa-paper-plane" style="margin-right:8px;"></i> บันทึกรายการ
          </button>
        </div>
 
        <footer><p>© 2026 Sukandakiangkai</p></footer>
      </div>
 
      <!-- ─── หน้าสรุป ─── -->
      <div id="page-summary" class="page hidden">
 
        <div class="select-wrap" style="margin-bottom:14px;">
          <select id="debt-filter" onchange="calculateAndRender()" class="filter-select">
            <option value="all">📊 สรุปทั้งหมด</option>
            <option value="Umay+พ่อ">Umay+พ่อ</option>
            <option value="Umay+สุ">Umay+สุ</option>
            <option value="ไทยประกันสุ">ไทยประกันสุ</option>
            <option value="ไทยประกันปุ้ย">ไทยประกันปุ้ย</option>
            <option value="ไทยประกันพ่อ">ไทยประกันพ่อ</option>

            <option value="ค่าโทรศัพท์ดา">ค่าโทรศัพท์ดา</option>

            <option value="ค่าไฟ">ค่าไฟ</option>
            <option value="ค่าเน็ตบ้าน3bb">ค่าเน็ตบ้าน 3bb</option>
            <option value="ค่าเน็ตมือถือสุ">ค่าเน็ตมือถือสุ</option>
            <option value="ค่าเน็ตมือถือปุ้ย">ค่าเน็ตมือถือปุ้ย</option>
            <option value="ค่าเน็ตมือถือพ่อ">ค่าเน็ตมือถือพ่อ</option>
            <option value="ออมสิน(สินเชื่อบ้าน)">ออมสิน (บ้าน)</option>
            <option value="ออมสิน(เครดิตสุ)">ออมสิน (สุ)</option>
            <option value="งวดรถvespa">งวดรถ Vespa</option>
          </select>
        </div>
 
        <div class="hero-card">
          <p class="hero-label" id="label-total">ยอดรวมที่จ่ายไปทั้งหมด</p>
          <div class="hero-amount" id="totalPaidBig">฿ 0</div>
          <span class="hero-count" id="countLabel">0 รายการ</span>
        </div>
 
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">📅 เดือนนี้</div>
            <div class="stat-amount blue" id="paidThisMonth">฿ 0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">📆 ปีนี้</div>
            <div class="stat-amount purple" id="paidThisYear">฿ 0</div>
          </div>
        </div>
 
        <div class="section-divider"><span>ประวัติรายการ</span></div>
        <div id="debtHistory"></div>
 
        <footer style="padding-bottom:8px;"><p>© 2026 Sukandakiangkai</p></footer>
      </div>
    </div>
 
    <!-- ─── MODAL แก้ไข ─── -->
    <div id="editModal" class="modal-overlay hidden">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title"><i class="fa-solid fa-pen-to-square" style="margin-right:8px;color:var(--accent-blue);"></i> แก้ไขข้อมูล</div>
        <input type="hidden" id="editRow" />
        <div class="field-group">
          <label class="field-label">วันที่จ่าย</label>
          <input type="date" id="editDate" class="premium-input" />
        </div>
        <div class="field-group">
          <label class="field-label">ชื่อรายการ</label>
          <input type="text" id="editName" class="premium-input" placeholder="ชื่อรายการ" />
        </div>
        <div class="field-group">
          <label class="field-label" style="color:var(--accent-green);">ยอดที่จ่าย</label>
          <input type="number" id="editPaid" class="premium-input" style="color:var(--accent-green);" placeholder="0.00" />
        </div>
        <div class="modal-btns">
          <button onclick="closeEdit()" class="btn-cancel">ยกเลิก</button>
          <button onclick="submitEdit()" class="btn-confirm">บันทึก</button>
        </div>
      </div>
    </div>
 
    <!-- ─── NAVBAR ─── -->
    <nav class="navbar">
      <button onclick="switchPage('input')" id="nav-input" class="nav-btn active">
        <i class="fa-solid fa-plus"></i>
        <span>บันทึก</span>
      </button>
      <button onclick="switchPage('summary')" id="nav-summary" class="nav-btn">
        <i class="fa-solid fa-chart-pie"></i>
        <span>สรุป</span>
      </button>
    </nav>
 
    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz9pBSfaJGM744SLru6Qb9nWaTXv_w2jRWTlAImw66FL45nkbwrRxxPfmhfKCD-2Ay_/exec";
      let allHistoryData = [];
 
      function initApp() {
        const now = new Date();
        document.getElementById("debt-date").value = now.toISOString().split("T")[0];
        updateDashboard();
      }
 
      function switchPage(page) {
        document.getElementById("page-input").classList.toggle("hidden", page !== "input");
        document.getElementById("page-summary").classList.toggle("hidden", page !== "summary");
        document.getElementById("nav-input").classList.toggle("active", page === "input");
        document.getElementById("nav-summary").classList.toggle("active", page === "summary");
        if (page === "summary") updateDashboard();
      }
 
      function handleDebtSelection() {
        const val = document.getElementById("debt-name-select").value;
        const other = document.getElementById("debt-name-other");
        if (val === "อื่นๆ") { other.classList.remove("hidden"); other.focus(); }
        else { other.classList.add("hidden"); }
      }
 
      function toggleOtherSource() {
        const val = document.getElementById("source-select").value;
        const other = document.getElementById("source-other");
        if (val === "อื่นๆ") { other.classList.remove("hidden"); other.focus(); }
        else { other.classList.add("hidden"); }
      }
 
      async function updateDashboard() {
        try {
          const res = await fetch(`${WEB_APP_URL}?action=getSummary`);
          const data = await res.json();
          allHistoryData = data.history || [];
          calculateAndRender();
        } catch (e) { console.log("Fetch Error"); }
      }
 
      function parseDate(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split("/");
        if (parts.length !== 3) return null;
        return new Date(`20${parts[2]}-${parts[1]}-${parts[0]}`);
      }
 
      function calculateAndRender() {
        const selectedDebt = document.getElementById("debt-filter").value;
        const now = new Date();
        const thisMonth = now.getMonth();
        const thisYear = now.getFullYear();
 
        let filtered = selectedDebt === "all"
          ? allHistoryData
          : allHistoryData.filter(item => item.name.includes(selectedDebt));
 
        document.getElementById("label-total").innerText = selectedDebt === "all"
          ? "ยอดรวมที่จ่ายไปทั้งหมด"
          : "ยอดรวมที่จ่าย: " + selectedDebt;
 
        const totalPaid = filtered.reduce((s, i) => s + Number(i.paid || 0), 0);
        const paidThisMonth = filtered.reduce((s, i) => {
          const d = parseDate(i.date);
          return (d && d.getMonth() === thisMonth && d.getFullYear() === thisYear) ? s + Number(i.paid || 0) : s;
        }, 0);
        const paidThisYear = filtered.reduce((s, i) => {
          const d = parseDate(i.date);
          return (d && d.getFullYear() === thisYear) ? s + Number(i.paid || 0) : s;
        }, 0);
 
        document.getElementById("totalPaidBig").innerText = `฿ ${totalPaid.toLocaleString()}`;
        document.getElementById("countLabel").innerText = `${filtered.length} รายการ`;
        document.getElementById("paidThisMonth").innerText = `฿ ${paidThisMonth.toLocaleString()}`;
        document.getElementById("paidThisYear").innerText = `฿ ${paidThisYear.toLocaleString()}`;
 
        renderHistory(filtered);
      }
 
      function renderHistory(history) {
        const list = document.getElementById("debtHistory");
        if (!history.length) {
          list.innerHTML = `<div class="empty-state"><i class="fa-regular fa-folder-open"></i>ไม่มีข้อมูล</div>`;
          return;
        }
        list.innerHTML = history.map(item => `
          <div class="history-item">
            <div>
              <div class="history-date">${item.date}</div>
              <div class="history-name">${item.name}</div>
              <div class="history-badge">฿ ${Number(item.paid).toLocaleString()}</div>
            </div>
            <div class="history-actions">
              <button onclick='openEdit(${JSON.stringify(item)})' class="action-btn btn-edit"><i class="fa-solid fa-pen-nib"></i></button>
              <button onclick="deleteItem(${item.row})" class="action-btn btn-delete"><i class="fa-solid fa-trash-can"></i></button>
            </div>
          </div>
        `).join("");
      }
 
      function openEdit(item) {
        document.getElementById("editRow").value = item.row;
        document.getElementById("editName").value = item.name;
        document.getElementById("editPaid").value = item.paid;
        if (item.date) {
          const parts = item.date.split("/");
          document.getElementById("editDate").value = `20${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        document.getElementById("editModal").classList.remove("hidden");
      }
 
      function closeEdit() {
        document.getElementById("editModal").classList.add("hidden");
      }
 
      async function submitEdit() {
        const payload = {
          action: "update",
          row: document.getElementById("editRow").value,
          date: document.getElementById("editDate").value,
          name: document.getElementById("editName").value,
          initial: 0,
          paid: document.getElementById("editPaid").value,
        };
        try {
          await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
          closeEdit();
          updateDashboard();
          alert("แก้ไขข้อมูลเรียบร้อยแล้ว ✨");
        } catch (e) { alert("เกิดข้อผิดพลาด"); }
      }
 
      async function deleteItem(row) {
        if (!confirm("ลบรายการนี้ใช่ไหม?")) return;
        await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "delete", row }) });
        updateDashboard();
      }
 
      async function saveData() {
        const btn = document.getElementById("btnSave");
        const select = document.getElementById("debt-name-select");
        const otherInput = document.getElementById("debt-name-other");
        const name = select.value === "อื่นๆ" ? otherInput.value : select.value;
        const paid = document.getElementById("paid-amount").value;
        if (!name || !paid) return alert("กรุณาระบุข้อมูลให้ครบจ้า");
        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin" style="margin-right:8px;"></i> กำลังบันทึก...`;
        const payload = {
          action: "insert",
          date: document.getElementById("debt-date").value,
          name, initial: 0, paid,
          source: document.getElementById("source-select").value,
        };
        try {
          await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
          confetti({ particleCount: 150, velocity: 30, spread: 360 });
          alert("จดบันทึกสำเร็จ! สู้ๆ ✨");
          location.reload();
        } catch (err) {
          alert("เกิดข้อผิดพลาด");
          btn.disabled = false;
          btn.innerHTML = `<i class="fa-solid fa-paper-plane" style="margin-right:8px;"></i> บันทึกรายการ`;
        }
      }
 
      window.onload = initApp;
    </script>
  </body>
</html>
